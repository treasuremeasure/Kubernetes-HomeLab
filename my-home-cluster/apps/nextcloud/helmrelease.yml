apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: app-nextcloud
spec:
  interval: 10m
  chart:
    spec:
      chart: ./my-home-cluster/apps/nextcloud
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      valuesFiles:
        - values.yaml
      interval: 1m
