apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-db-backup
  namespace: app-nextcloud
spec:
  timeZone: "Europe/Moscow"
  schedule: "23 0 * * *"            
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 5
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values: [nextcloud]
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: db-backup
              image: nouchka/sqlite3:latest 
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TS=$(date +%F-%H%M)
                  echo "starting backup nextcloud-${TS}.db"
                  sqlite3 /data/nextcloud.db ".backup '/backup/nextcloud-${TS}.db'"
                  find /backup -name 'nextcloud-*.db' -mtime +14 -delete
                  echo "done; current backups:"
                  ls -la /backup
              volumeMounts:
                - name: nc-data
                  mountPath: /data
                  subPath: data  
                - name: backup-dir
                  mountPath: /backup
          volumes:
            - name: nc-data
              persistentVolumeClaim:
                claimName: nextcloud-nextcloud     
            - name: backup-dir