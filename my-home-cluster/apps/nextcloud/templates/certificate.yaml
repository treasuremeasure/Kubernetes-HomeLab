apiVersion: cert-manager.io/v1
  kind: Certificate
  metadata:
    name: nextcloud-tls
    namespace: app-nextcloud	
  spec:
    secretName: nextcloud-tls
    duration: 2160h               
    renewBefore: 360h             
    dnsNames:
      - nextcloud.kube.home
      - nextcloud.app-nextcloud.svc.cluster.local
      - nextcloud.app-nextcloud.svc
      - "*.nextcloud-internal.app-nextcloud.svc.cluster.local"
    ipAddresses:
      - 127.0.0.1
    issuerRef:
      name: homelab-ca
      kind: ClusterIssuer
