apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vault-isolation
  namespace: infra-vault
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system 
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: external-secrets   
      ports:
        - port: 8200
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: external-secrets  
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP